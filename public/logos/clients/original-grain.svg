<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- Mountain / triangle icon (brand mark) -->
  <polygon points="32,8 58,56 6,56" fill="white" opacity="0.85"/>
  <!-- Inner detail line -->
  <polygon points="32,22 46,56 18,56" fill="white" fill-opacity="0" stroke="white" stroke-width="1" opacity="0.35"/>
  <!-- Peak dot -->
  <circle cx="32" cy="8" r="2.5" fill="white"/>

  <!-- Wordmark -->
  <text x="72" y="29" fill="white" font-family="'Arial Black', Arial, sans-serif"
        font-size="14" font-weight="900" letter-spacing="1.5">ORIGINAL</text>
  <text x="72" y="50" fill="white" font-family="'Arial Black', Arial, sans-serif"
        font-size="14" font-weight="900" letter-spacing="2.8">GRAIN</text>
</svg>
