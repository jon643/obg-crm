<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none">
  <!-- Circle emblem -->
  <circle cx="32" cy="32" r="27" stroke="white" stroke-width="2" fill="white" fill-opacity="0.07"/>
  <!-- Crawfish / fleur-de-lis simplified icon -->
  <!-- Body -->
  <ellipse cx="32" cy="34" rx="8" ry="5" fill="white" opacity="0.9"/>
  <!-- Claws -->
  <path d="M24,34 C18,28 16,24 20,22 C22,21 24,24 24,27" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M40,34 C46,28 48,24 44,22 C42,21 40,24 40,27" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Tail -->
  <path d="M32,39 C28,44 26,48 32,50 C38,48 36,44 32,39" fill="white" opacity="0.7"/>
  <!-- Antennae -->
  <line x1="28" y1="29" x2="18" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="36" y1="29" x2="46" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Wordmark -->
  <text x="70" y="26" fill="white" font-family="'Arial Black', Arial, sans-serif"
        font-size="15" font-weight="900" letter-spacing="0">CAJUN</text>
  <text x="70" y="46" fill="white" font-family="'Arial Black', Arial, sans-serif"
        font-size="15" font-weight="900" letter-spacing="0">TWO STEP</text>
  <text x="70" y="58" fill="white" font-family="Arial, sans-serif"
        font-size="7" font-weight="400" letter-spacing="1" opacity="0.6">That's Money Dude!</text>
</svg>
